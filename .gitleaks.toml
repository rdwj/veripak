[allowlist]
description = "Project-specific allowlist for false positives"

paths = [
    '''tests?\/fixtures\/''',
    '''examples\/''',
    '''docs\/.*\.md$''',
    '''planning\/.*\.md$''',
    '''research\/.*\.md$''',
    '''README\.md$''',
]

regexes = [
    '''YOUR_.*_HERE''',
    '''<your-.*-here>''',
    '''REPLACE_WITH_YOUR''',
]
